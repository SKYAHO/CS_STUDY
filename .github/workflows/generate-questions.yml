name: 면접 질문 자동 생성

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

jobs:
  generate:
    if: contains(github.event.issue.labels.*.name, 'generate-questions')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: 질문 생성
        id: gen
        run: python scripts/generate_questions.py

      - name: 파일 커밋
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "feat: add questions (${{ github.event.issue.title }})"

      - name: 성공 댓글 + Issue 닫기
        if: success()
        env:
          MSG: ${{ steps.gen.outputs.message }}
        uses: actions/github-script@v7
        with:
          script: |
            const num = context.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: num, body: process.env.MSG
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: num, state: "closed"
            });

      - name: 실패 댓글
        if: failure() && steps.gen.outcome == 'failure'
        env:
          MSG: ${{ steps.gen.outputs.message }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body: process.env.MSG || "❌ 질문 생성에 실패했습니다. Action 로그를 확인하세요."
            });
